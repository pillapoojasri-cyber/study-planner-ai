<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="ai-container">

<h1>🗓️ AI Study Planner</h1>

<form method="POST">

<input type="text"
       name="subject"
       placeholder="Subject Name"
       required>

<br><br>

<input type="date"
       name="exam_date"
       required>

<br><br>

<input type="number"
       name="hours"
       placeholder="Hours Per Day"
       required>

<br><br>

<button type="submit">
Generate Study Plan
</button>

</form>

{% if plan %}

<h2>Generated Plan</h2>

<pre class="guide-box">
{{ plan }}
</pre>

{% endif %}

<a href="/home"
   class="back-btn">

⬅ Back

</a>

</div>

</body>
</html>
