<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<div class="login-box">

    <h2>Reset Password</h2>

    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}

    {% if success %}
    <p class="success-message">{{ success }}</p>
    {% endif %}

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <br><br>

        <input type="password"
               name="new_password"
               placeholder="New Password"
               required>

        <br><br>

        <input type="password"
               name="confirm_password"
               placeholder="Confirm Password"
               required>

        <br><br>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <br>

    <a href="/login">
        Back to Login
    </a>

</div>

</body>
</html>
