<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">


<body>

<h1>📚 STUDY PLANNER</h1>

<div class="login-box">

    <p>Plan • Learn • Achieve</p>

    <h2>Welcome Back!</h2>

{% if error %}
<p class="error-message">{{ error }}</p>
{% endif %}

<form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

<a href="/forgot_password">
    Forgot Password?
</a>

    <a href="/signup">
        <button type="button">
            Sign Up
        </button>
    </a>

</div>

</body>
</head>
</html>
