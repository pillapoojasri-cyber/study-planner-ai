<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Page</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<div class="signup-box">

    <h1>STUDY PLANNER</h1>

    <p>Create Your Account</p>
     {% if error %}
<p class="error-message">{{ error }}</p>
{% endif %}
    <form method="POST">

        <input type="text"
               name="fullname"
               placeholder="Full Name"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <br><br>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <input type="password"
               name="confirm_password"
               placeholder="Confirm Password"
               required>

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <a href="/login">
        <button type="button">
            Back to Login
        </button>
    </a>

</div>

</body>
</html>
