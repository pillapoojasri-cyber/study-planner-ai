<!DOCTYPE html>
<html>
<head>
    <title>AI Study Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

.ai-container{
    max-width:900px;
    margin:40px auto;

    background:#1e293b;

    padding:30px;

    border-radius:20px;

    box-shadow:0 8px 20px rgba(0,0,0,0.3);

    color:white;
}

.topic{
    color:#60a5fa;
    margin-bottom:20px;
}

.guide-box{
    background:#334155;

    color:white;

    padding:20px;

    border-radius:12px;

    white-space:pre-wrap;

    line-height:1.8;
}

.back-btn{
    display:inline-block;

    margin-top:20px;

    padding:10px 20px;

    background:#3b82f6;

    color:white;

    text-decoration:none;

    border-radius:8px;
}

.back-btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="ai-container">

    <h1>🤖 AI Study Coach</h1>

    <h2 class="topic">{{ topic }}</h2>

    <pre class="guide-box">{{ guide }}</pre>
    <a href="/home" class="back-btn">
        ⬅ Back to Home
    </a>

</div>

</body>
</html>
